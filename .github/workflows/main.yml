name: Ejecutar Bot FMTO
on:
  schedule:
    - cron: '0 8 * * 4'   # Jueves 10:00 CEST (UTC+2)
    - cron: '0 15 * * 4'  # Jueves 17:00 CEST
    - cron: '0 7 * * 5'   # Viernes 09:00 CEST
  workflow_dispatch: # Permite ejecutarlo a mano para probar

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install playwright requests
          playwright install chromium --with-deps
      - name: Ejecutar bot
        env:
          WIRTEX_USER: ${{ secrets.WIRTEX_USER }}
          WIRTEX_PASS: ${{ secrets.WIRTEX_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python bot.py
