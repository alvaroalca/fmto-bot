name: Ejecutar Bot FMTO
on:
  schedule:
    - cron: '0 7 * * 5'   # Viernes 09:00 CEST (UTC+2)
    - cron: '0 10 * * 5'  # Viernes 12:00 CEST
    - cron: '0 16 * * 5'  # Viernes 18:00 CEST
  workflow_dispatch: # Permite ejecutarlo a mano para probar

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install playwright requests pypdf
          playwright install chromium --with-deps
      - name: Ejecutar bot
        env:
          FMTO_USER: ${{ secrets.FMTO_USER }}
          FMTO_PASS: ${{ secrets.FMTO_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
